version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: epa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-epauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-epapass}
      POSTGRES_DB: ${POSTGRES_DB:-epadb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-epauser} -d ${POSTGRES_DB:-epadb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - epa-network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: epa-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@epa.gov}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - epa-network
    profiles:
      - admin

volumes:
  postgres_data:
    name: epa_postgres_data

networks:
  epa-network:
    name: epa_network
    driver: bridge
